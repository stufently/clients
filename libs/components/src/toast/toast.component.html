<div [class]="styles().root()" [attr.role]="variant() === 'error' ? 'alert' : null">
  <div [class]="styles().body()">
    <bit-icon [name]="iconName()" [class]="styles().icon()"></bit-icon>
    <div>
      <span class="tw-sr-only">{{ variant() | i18n }}</span>
      @for (m of messageArray(); track m) {
        <p bitTypography="body2" data-testid="toast-message" [class]="styles().message()">
          {{ m }}
        </p>
      }
    </div>
    <button
      [class]="styles().closeButton()"
      bitIconButton="bwi-close"
      [buttonType]="closeButtonType()"
      type="button"
      size="small"
      (click)="onClose.emit()"
      [label]="'close' | i18n"
    ></button>
  </div>
</div>
