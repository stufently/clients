<div [class]="styles().root()" [attr.role]="variant() === 'error' ? 'alert' : null">
  <div [class]="styles().body()">
    <i aria-hidden="true" [class]="styles().icon()"></i>
    <div>
      <span class="tw-sr-only">{{ variant() | i18n }}</span>
      @if (title(); as title) {
        <p data-testid="toast-title" [class]="styles().title()">{{ title }}</p>
      }
      @for (m of messageArray(); track m) {
        <p bitTypography="body2" data-testid="toast-message" [class]="styles().message()">
          {{ m }}
        </p>
      }
    </div>
    <!-- Overriding hover and focus-visible colors for a11y against colored background -->
    <button
      [class]="styles().closeButton()"
      bitIconButton="bwi-close"
      buttonType="primaryGhost"
      type="button"
      size="small"
      (click)="onClose.emit()"
      [label]="'close' | i18n"
    ></button>
  </div>
</div>
