<div
  role="status"
  aria-live="polite"
  aria-atomic="false"
  [class]="styles.root()"
  [style.--bit-toast-bottom]="bottomOffset() ?? '1rem'"
  [style.--bit-toast-end]="endOffset() ?? '1rem'"
>
  @for (toast of service.toasts(); track toast.id; let last = $last) {
    <div
      animate.enter="tw-animate-toast-in"
      animate.leave="tw-animate-toast-out"
      [class]="styles.item()"
      [style.visibility]="last ? null : 'hidden'"
      [style.pointer-events]="last ? 'auto' : 'none'"
      style="-webkit-app-region: no-drag"
      (mouseenter)="service.pause()"
      (mouseleave)="service.resume()"
    >
      <bit-toast
        [message]="toast.message"
        [variant]="toast.variant"
        (onClose)="service.remove(toast.id)"
      ></bit-toast>
    </div>
  }
</div>
