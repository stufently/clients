<div class="tw-pe-1">{{ label() }}</div>
<div [class]="outerBarStyles">
  <div
    [class]="innerBarStyles"
    role="progressbar"
    aria-valuemin="0"
    aria-valuemax="100"
    attr.aria-valuenow="{{ barWidth() }}"
    [style]="{ width: barWidth() + '%' }"
  ></div>
</div>
<div class="tw-flex tw-text-sm tw-text-fg-body">
  <span class="tw-mr-auto">{{ startTextContent() }}</span>
  <span class="tw-ml-auto">{{ endText() }}</span>
</div>
