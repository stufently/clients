<div class="tw-flex tw-w-full tw-gap-8">
  <div class="tw-flex tw-justify-center tw-items-center">
    <ng-content select="[slot=illustration]"></ng-content>
  </div>
  <div class="tw-flex tw-flex-col tw-justify-center tw-flex-1 tw-gap-6">
    <div class="tw-flex tw-flex-col tw-gap-1">
      <span class="tw-text-2xl">{{ title() }}</span>
      <span class="tw-text-fg-body">{{ subtitle() }}</span>
    </div>
    <div>
      <div class="tw-pe-1">{{ label() }}</div>
      <div [ngClass]="outerBarStyles">
        <div
          [ngClass]="innerBarStyles"
          role="progressbar"
          aria-valuemin="0"
          aria-valuemax="100"
          attr.aria-valuenow="{{ progressAmount() }}"
          [ngStyle]="{ width: progressAmount() + '%' }"
        ></div>
      </div>
      <div class="tw-text-sm tw-text-fg-body">
        <span>{{ leftText() }}</span>
        <span class="tw-float-right">{{ rightText() }}</span>
      </div>
    </div>
  </div>
</div>
