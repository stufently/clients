<form [id]="formId" [formGroup]="sendForm" [bitSubmit]="submit">
  @if (!loading) {
    @if (!editing()) {
      <bit-card>
        <bit-form-field bitTypography="h4">
          <bit-label class="tw-text-main">{{ "sendLink" | i18n }}</bit-label>
          <input
            class="tw-text-muted"
            data-testid="send-link"
            bitInput
            type="text"
            [value]="sendLink()"
            readonly
          />
        </bit-form-field>
        <button
          class="tw-w-full"
          bitButton
          type="button"
          showToast
          buttonType="primary"
          startIcon="bwi-clone"
          [appCopyClick]="sendLink()"
          [valueLabel]="'sendLink' | i18n"
        >
          Copy
        </button>
      </bit-card>
    }
    <tools-send-details
      [config]="config"
      [originalSendView]="originalSendView"
      [editing]="editing()"
      (openPasswordGenerator)="openPasswordGenerator.emit()"
    ></tools-send-details>
  }
</form>
