<app-spotlight-search
  placeholder="Search vault…"
  [type]="type"
  [results]="results()"
  (queryChange)="onQuery($event)"
  (itemAction)="onItemAction($event)"
>
  <!-- Footer hints template -->
  <ng-template #footerHints>
    <span class="tw-flex tw-items-center tw-gap-1.5">
      <kbd
        class="tw-rounded tw-border tw-border-secondary-300 tw-bg-secondary-100 tw-px-1.5 tw-py-0.5 tw-font-mono tw-text-xs tw-leading-[normal]"
        >↵</kbd
      >
      Copy password
    </span>
    <span class="tw-flex tw-items-center tw-gap-1.5">
      <kbd
        class="tw-rounded tw-border tw-border-secondary-300 tw-bg-secondary-100 tw-px-1.5 tw-py-0.5 tw-font-mono tw-text-xs tw-leading-[normal]"
        >{{ isMac ? "⌘C" : "Ctrl+C" }}</kbd
      >
      Copy username
    </span>
  </ng-template>
</app-spotlight-search>
