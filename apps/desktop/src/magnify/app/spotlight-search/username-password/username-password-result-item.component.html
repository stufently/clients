<!-- Cipher icon -->
<div class="tw-flex tw-size-9 tw-shrink-0 tw-items-center tw-justify-center" aria-hidden="true">
  @if (item().faviconUrl) {
    <img
      [src]="item().faviconUrl"
      [alt]=""
      class="tw-size-6 tw-rounded-md tw-object-contain"
      (error)="
        $any($event.target).style.display = 'none';
        $any($event.target).nextElementSibling.style.display = 'inline'
      "
    />
    <i class="bwi bwi-globe bwi-lg tw-text-muted" style="display: none"></i>
  } @else {
    <i class="bwi bwi-globe bwi-lg tw-text-muted"></i>
  }
</div>

<!-- Cipher info -->
<div class="tw-min-w-0 tw-flex-1">
  <div class="tw-truncate tw-text-base tw-font-semibold tw-text-main">
    {{ item().name }}
  </div>
  @if (item().username) {
    <div class="tw-truncate tw-text-xs tw-text-muted">
      {{ item().username }}
    </div>
  }
</div>

<!-- Action chips (selected row only) + shortcut badge -->
<div class="tw-flex tw-shrink-0 tw-items-center tw-gap-2">
  @if (isSelected()) {
    <div class="tw-flex tw-items-center tw-gap-1.5">
      <button
        type="button"
        aria-label="Copy password"
        [class]="
          copiedPasswordId() === item().id
            ? 'tw-flex tw-items-center tw-gap-1 tw-rounded-md tw-bg-success-600 tw-px-2.5 tw-border-0 tw-text-xs tw-font-medium tw-text-white tw-transition-colors'
            : 'tw-flex tw-items-center tw-gap-1 tw-rounded-md tw-bg-primary-100 tw-px-2.5 tw-border-0 tw-text-xs tw-font-medium tw-text-primary-700 tw-transition-colors'
        "
        (click)="$event.stopPropagation(); copyPassword()"
      >
        @if (copiedPasswordId() === item().id) {
          ✓ Copied
        } @else {
          Copy password
          <kbd>{{ isMac ? "⌘C" : "^C" }}</kbd>
        }
      </button>
      @if (item().username) {
        <button
          type="button"
          aria-label="Copy username"
          [class]="
            copiedUsernameId() === item().id
              ? 'tw-flex tw-items-center tw-gap-1 tw-rounded-md tw-bg-success-600 tw-px-2.5 tw-border-0 tw-text-xs tw-font-medium tw-text-white tw-transition-colors'
              : 'tw-flex tw-items-center tw-gap-1 tw-rounded-md tw-bg-primary-100 tw-px-2.5 tw-border-0 tw-text-xs tw-font-medium tw-text-primary-700 tw-transition-colors'
          "
          (click)="$event.stopPropagation(); copyUsername()"
        >
          @if (copiedUsernameId() === item().id) {
            ✓ Copied
          } @else {
            Copy username
            <kbd>{{ isMac ? "⌘⇧C" : "^⇧C" }}</kbd>
          }
        </button>
      }
      @if (item().hasUri) {
        <button
          type="button"
          aria-label="Launch"
          class="tw-flex tw-items-center tw-justify-center tw-size-7 tw-rounded tw-border-0 tw-bg-transparent tw-text-primary-700 tw-transition-colors hover:tw-bg-primary-100"
          (click)="$event.stopPropagation(); launchCipher()"
        >
          <i class="bwi bwi-external-link" aria-hidden="true"></i>
        </button>
      }
    </div>
  }

  <!-- ⌘N / ^N shortcut badge -->
  @if (index() < maxResults) {
    <kbd
      class="tw-min-w-[2rem] tw-rounded tw-px-1.5 tw-py-0.5 tw-text-center tw-text-xs tw-font-mono"
      [class.tw-border]="true"
      [class.tw-border-secondary-300]="!isSelected()"
      [class.tw-border-primary-300]="isSelected()"
      [class.tw-bg-secondary-100]="!isSelected()"
      [class.tw-text-muted]="!isSelected()"
      [class.tw-bg-primary-50]="isSelected()"
      [class.tw-text-primary-600]="isSelected()"
      >{{ isMac ? "⌘" : "^" }}{{ index() + 1 }}</kbd
    >
  }
</div>
