<bit-callout type="warning">
  {{ "sendControlsExemption" | i18n }}
</bit-callout>

<bit-form-control>
  <input type="checkbox" bitCheckbox [formControl]="enabled" id="enabled" />
  <bit-label>{{ "turnOn" | i18n }}</bit-label>
</bit-form-control>

<div [formGroup]="data">
  <h3 bitTypography="h3" class="tw-mt-4">{{ "options" | i18n }}</h3>
  <bit-form-control>
    <input
      type="checkbox"
      bitCheckbox
      formControlName="disableSend"
      id="disableSend"
      [disabled]="!enabled.value"
    />
    <bit-label>{{ "disableSend" | i18n }}</bit-label>
  </bit-form-control>
  <bit-form-control>
    <input
      type="checkbox"
      bitCheckbox
      formControlName="disableHideEmail"
      id="disableHideEmail"
      [disabled]="!enabled.value"
    />
    <bit-label>{{ "disableHideEmail" | i18n }}</bit-label>
  </bit-form-control>

  <bit-form-field>
    <bit-label>{{ "whoCanView" | i18n }}</bit-label>
    <bit-select formControlName="whoCanAccess" id="whoCanAccess">
      <bit-option
        *ngFor="let o of whoCanAccessOptions"
        [value]="o.value"
        [label]="o.name"
      ></bit-option>
    </bit-select>
  </bit-form-field>

  @if (showDomains()) {
    <bit-form-field>
      <bit-label>{{ "allowedDomains" | i18n }}</bit-label>
      <textarea
        bitInput
        formControlName="allowedDomains"
        id="allowedDomains"
        rows="3"
        [placeholder]="'allowedDomainsPlaceholder' | i18n"
      ></textarea>
      <bit-hint>{{ "allowedDomainsHint" | i18n }}</bit-hint>
    </bit-form-field>
  }
</div>
